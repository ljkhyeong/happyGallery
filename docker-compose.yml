services:
  mysql:
    image: mysql:8
    container_name: happygallery-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: happygallery
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
