spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: INFO
    com.personal.happygallery: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
