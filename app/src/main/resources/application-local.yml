spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/happygallery?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:happygallery}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  admin:
    api-key: dev-admin-key
    enable-api-key-auth: true

management:
  server:
    port: ${MANAGEMENT_PORT:8080}
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: DEBUG
    com.personal.happygallery: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
