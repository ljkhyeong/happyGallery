server:
  shutdown: graceful

spring:
  application:
    name: happygallery
  datasource:
    hikari:
      # DB wait_timeout(초)보다 짧게 유지한다.
      # 기본값: DB 600초(10분) 기준 540초(9분).
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:540000}
      # REQUIRES_NEW가 포함된 작업은 스레드당 커넥션 2개를 점유할 수 있다.
      # Hikari 권장식: T_n * (C_m - 1) + 1
      # 현재 기본값(T_n=4, C_m=2) 기준 최소 5이므로 여유를 두어 12로 설정한다.
      maximum-pool-size: ${DB_HIKARI_MAXIMUM_POOL_SIZE:12}
      minimum-idle: ${DB_HIKARI_MINIMUM_IDLE:4}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  profiles:
    default: local
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false

app:
  admin:
    api-key: ${ADMIN_API_KEY:dev-admin-key}
    enable-api-key-auth: ${ADMIN_ENABLE_API_KEY_AUTH:true}
  batch:
    scheduler:
      pool-size: ${BATCH_SCHEDULER_POOL_SIZE:4}
  external:
    payment:
      # SI 운영 기본값: 외부 호출은 짧은 타임아웃 + 서킷 브레이커로 보호
      timeout-millis: ${PAYMENT_TIMEOUT_MILLIS:3000}
      circuit-breaker:
        failure-rate-threshold: ${PAYMENT_CB_FAILURE_RATE_THRESHOLD:50}
        sliding-window-size: ${PAYMENT_CB_SLIDING_WINDOW_SIZE:20}
        minimum-number-of-calls: ${PAYMENT_CB_MINIMUM_CALLS:10}
        wait-duration-open-seconds: ${PAYMENT_CB_WAIT_OPEN_SECONDS:30}
        permitted-calls-in-half-open-state: ${PAYMENT_CB_HALF_OPEN_CALLS:3}
  rate-limit:
    enabled: true
    trust-forwarded-headers: ${RATE_LIMIT_TRUST_FORWARDED:false}
    phone-verification-per-second: 10
    booking-create-per-minute: 30
    pass-purchase-per-minute: 20
    customer-login-per-minute: 10
    customer-signup-per-minute: 5
    admin-login-per-minute: 5
    admin-api-per-minute: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:never}
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:happygallery@${project.version:unknown}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  context-tags:
    - requestId
  send-default-pii: false
  exception-resolver-order: 2147483647

logging:
  level:
    root: INFO
    com.personal.happygallery: INFO
