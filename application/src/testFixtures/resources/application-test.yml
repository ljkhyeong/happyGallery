spring:
  config:
    activate:
      on-profile: test

app:
  admin:
    api-key: dev-admin-key
    enable-api-key-auth: true
  guest-token:
    hmac-secret: "test-hmac-secret-key-at-least-32-bytes-long-for-security"
    expiry-hours: 168
  rate-limit:
    enabled: false
  field-encryption:
    encrypt-key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    hmac-key: "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
  external:
    kakao:
      api-key: "test-kakao-api-key"
      sender-key: "test-kakao-sender-key"
    sms:
      api-key: "test-sms-api-key"
      api-secret: "test-sms-api-secret"
      sender-number: "01000000000"

logging:
  level:
    root: WARN
    com.personal.happygallery: INFO
