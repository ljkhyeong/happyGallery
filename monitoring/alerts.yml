groups:
  - name: happygallery-system
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{application="happygallery",status=~"5.."}[5m]) > 0.5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "5xx 에러율이 높습니다 ({{ $value | printf \"%.2f\" }} req/s)"

      - alert: HighResponseLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{application="happygallery"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p95 응답 시간이 2초를 초과합니다 ({{ $value | printf \"%.2f\" }}s)"

      - alert: HikariPoolExhaustion
        expr: hikaricp_connections_active{application="happygallery"} / hikaricp_connections_max{application="happygallery"} > 0.8
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "HikariCP 커넥션 풀 사용률이 80%를 초과합니다"

      - alert: JvmHeapHigh
        expr: jvm_memory_used_bytes{application="happygallery",area="heap"} / jvm_memory_max_bytes{application="happygallery",area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 힙 사용률이 85%를 초과합니다"

      - alert: AppDown
        expr: up{job="happygallery"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "happyGallery 앱이 응답하지 않습니다"
